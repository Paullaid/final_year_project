name = "pastquestions-r2-presign"
main = "index.js"
compatibility_date = "2024-09-23"

# Non-secret configuration (safe to commit). R2 API tokens must be provided via secrets.
[vars]
R2_ACCOUNT_ID = "REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID"
R2_BUCKET_NAME = "pastquestions"
# Optional but recommended: when set, Worker requires valid Firebase ID token.
FIREBASE_PROJECT_ID = "REPLACE_WITH_FIREBASE_PROJECT_ID"

# Set secrets (do NOT commit):
#   npx wrangler secret put R2_ACCESS_KEY_ID
#   npx wrangler secret put R2_SECRET_ACCESS_KEY
#
# Optional: override vars per environment:
# [env.production.vars]
# R2_ACCOUNT_ID = "..."
